<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sparkle Audio Test</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        overflow: hidden;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        color: #fff;
        cursor: pointer;
      }

      h1 {
        font-size: 2rem;
        text-align: center;
      }

      .sparkle {
        position: fixed;
        pointer-events: none;
        font-size: 20px;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <h1>Move Your Mouse ✨</h1>

    <script>
      const AudioCtx = window.AudioContext || window.webkitAudioContext;

      let audioCtx = null;
      let audioUnlocked = false;
      const harryPotterNotes = [
  987.77, // B5
  1318.51, // E6
  1567.98, // G6
  1479.98, // F#6
  1318.51, // E6
  1975.53, // B6
  1760.00, // A6
  1479.98, // F#6
  1318.51, // E6
  1567.98, // G6
  1479.98, // F#6
  1244.51, // D#6
  1396.91, // F6
  987.77 // B5
];
    //   const sparkleNotes = [523, 659, 784, 1047, 1319, 1568, 2093, 2637];
    const sparkleNotes = harryPotterNotes;

      let lastSparkleTime = 0;
      let lastSoundX = 0;
      let lastSoundY = 0;

      function ensureAudio() {
        if (!audioCtx) {
          audioCtx = new AudioCtx();
        }

        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }

        audioUnlocked = true;
      }

      document.addEventListener("pointerdown", ensureAudio, { once: true });

      function spawnSparkleParticle(x, y) {
        const star = document.createElement("div");

        star.className = "sparkle";
        star.innerHTML = "✨";

        star.style.left = x + "px";
        star.style.top = y + "px";

        document.body.appendChild(star);

        const start = Date.now();

        function animate() {
          const elapsed = Date.now() - start;

          if (elapsed > 500) {
            star.remove();
            return;
          }

          star.style.transform = `translateY(-${elapsed / 4}px)`;

          star.style.opacity = 1 - elapsed / 500;

          requestAnimationFrame(animate);
        }

        animate();
      }

      function playSparkle(x, y) {
        if (!audioUnlocked) return;

        const now = audioCtx.currentTime;

        const freq =
          sparkleNotes[Math.floor(Math.random() * sparkleNotes.length)];

        const osc1 = audioCtx.createOscillator();

        const gain1 = audioCtx.createGain();

        osc1.type = "sine";

        osc1.frequency.setValueAtTime(freq, now);

        gain1.gain.setValueAtTime(0.08, now);

        gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.25);

        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);

        osc1.start(now);
        osc1.stop(now + 0.25);

        spawnSparkleParticle(x, y);
      }

      document.addEventListener("mousemove", (e) => {
        const now = Date.now();

        const dx = e.clientX - lastSoundX;
        const dy = e.clientY - lastSoundY;

        const dist = Math.sqrt(dx * dx + dy * dy);

        if (now - lastSparkleTime > 120 && dist > 10) {
          playSparkle(e.clientX, e.clientY);

          lastSparkleTime = now;
          lastSoundX = e.clientX;
          lastSoundY = e.clientY;
        }
      });
    </script>
  </body>
</html>
