```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Satya Form</title>

<style>
body{
font-family:Arial,sans-serif;
max-width:500px;
margin:50px auto;
padding:20px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#218838;
}

#msg{
margin-top:15px;
font-weight:bold;
text-align:center;
}
</style>

</head>
<body>

<h2>Personal Information</h2>

<input
type="text"
id="name"
placeholder="Enter Name"
required>

<input
type="email"
id="email"
placeholder="Enter Email"
required>

<button onclick="submitData()">
Submit
</button>

<div id="msg"></div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwqmv0Ikws1qGB24wql702J2rCrZaXvbVx0Pggyuso5g-nj8vCxJM6_eSKtRL4u2jAdtA/exec";

async function submitData(){

const name =
document.getElementById("name").value.trim();

const email =
document.getElementById("email").value.trim();

if(!name || !email){

alert("Please fill all fields");

return;

}

const data = {
name:name,
email:email
};

try{

document.getElementById("msg").innerHTML =
"Submitting...";

await fetch(
SCRIPT_URL,
{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
}
);

document.getElementById("msg").innerHTML =
"✅ Data submitted successfully";

document.getElementById("name").value = "";
document.getElementById("email").value = "";

}
catch(error){

console.error(error);

document.getElementById("msg").innerHTML =
"❌ Submission failed";

}

}

</script>

</body>
</html>
```
